<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0f172a" />
    <title>Orçamento Já | Criar Orçamento</title>
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" href="/assets/logo.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="app-body">
    <main class="action-shell">
      <section class="action-card">
        <img src="/assets/logo.svg" alt="Logo Orçamento Já" class="action-logo" />
        <p class="eyebrow">Novo orçamento</p>
        <h1 class="page-title">Criar orçamento</h1>
        <p class="hero-copy">Informe os dados da categoria para acompanhar uma nova meta.</p>

        <form class="group-form" id="createBudgetForm">
          <input type="hidden" id="idGrupo" name="idGrupo" />
          <input type="hidden" id="idUsuario" name="idUsuario" />

          <label for="dsCategoria">Categoria</label>
          <div class="group-input-shell">
            <span class="group-input-icon" aria-hidden="true">#</span>
            <input
              type="text"
              id="dsCategoria"
              name="dsCategoria"
              autocomplete="off"
              required
              maxlength="80"
              placeholder="Ex.: Supermercado"
            />
          </div>

          <label for="diaCorte">Dia de Corte</label>
          <div class="group-input-shell">
            <span class="group-input-icon" aria-hidden="true">D</span>
            <input
              type="number"
              id="diaCorte"
              name="diaCorte"
              required
              min="1"
              max="30"
              step="1"
              placeholder="Ex.: 30"
            />
          </div>

          <label for="valorMeta">Valor Meta</label>
          <div class="group-input-shell">
            <span class="group-input-icon" aria-hidden="true">R$</span>
            <input
              type="text"
              id="valorMeta"
              name="valorMeta"
              required
              inputmode="numeric"
              autocomplete="off"
              maxlength="16"
              placeholder="Ex.: 1500,00"
            />
          </div>

          <button type="submit" class="primary-button" id="createBudgetButton">Criar</button>
        </form>

        <p class="api-result" id="createBudgetResult" hidden></p>

        <div class="action-buttons action-buttons-compact" id="createBudgetActions" hidden>
          <button type="button" class="ghost-button ghost-button-dark" id="homeButton">Home</button>
        </div>
      </section>
    </main>

    <script src="/moneyInput.js" defer></script>
    <script src="/criarOrcamento.js" defer></script>
  </body>
</html>
