<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0f172a" />
    <title>Orcamento Ja | Movimento</title>
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" href="/assets/logo.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="app-body">
    <main class="action-shell">
      <section class="action-card">
        <img src="/assets/logo.svg" alt="Logo Orcamento Ja" class="action-logo" />
        <p class="eyebrow">Movimento</p>
        <h1 class="page-title">Adicionar movimento</h1>
        <p class="hero-copy" id="movementCategory">Informe o valor e a descricao para este orcamento.</p>

        <form class="group-form" id="movementForm">
          <input type="hidden" id="idOrcamento" name="idOrcamento" />
          <input type="hidden" id="idUsuario" name="idUsuario" />

          <label for="valor">Valor</label>
          <div class="group-input-shell">
            <span class="group-input-icon" aria-hidden="true">R$</span>
            <input
              type="number"
              id="valor"
              name="valor"
              required
              min="0.01"
              step="0.01"
              inputmode="decimal"
              placeholder="Ex.: 350,00"
            />
          </div>

          <label for="descricao">Descricao</label>
          <div class="group-input-shell">
            <span class="group-input-icon" aria-hidden="true">#</span>
            <input
              type="text"
              id="descricao"
              name="descricao"
              autocomplete="off"
              required
              maxlength="120"
              placeholder="Ex.: Restaurante, Supermercado, Combustivel"
            />
          </div>

          <button type="submit" class="primary-button" id="createMovementButton">Adicionar</button>
        </form>

        <p class="api-result" id="movementResult" hidden></p>

        <div class="action-buttons action-buttons-compact">
          <button type="button" class="ghost-button ghost-button-dark" id="homeButton">Home</button>
        </div>
      </section>
    </main>

    <script src="/movimentos.js" defer></script>
  </body>
</html>
