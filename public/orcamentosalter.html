<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0f172a" />
    <title>Orcamento Ja | Alterar Orcamento</title>
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" href="/assets/logo.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="app-body">
    <main class="action-shell">
      <section class="action-card">
        <img src="/assets/logo.svg" alt="Logo Orcamento Ja" class="action-logo" />
        <p class="eyebrow">Orcamento</p>
        <h1 class="page-title">Alterar orcamento</h1>
        <p class="hero-copy">Atualize os dados da categoria ou exclua este orcamento.</p>

        <form class="group-form" id="budgetUpdateForm">
          <label for="idOrcamento">ID do Orcamento</label>
          <div class="group-input-shell">
            <span class="group-input-icon" aria-hidden="true">ID</span>
            <input type="text" id="idOrcamento" name="idOrcamento" readonly required />
          </div>

          <label for="dsCategoria">Categoria</label>
          <div class="group-input-shell">
            <span class="group-input-icon" aria-hidden="true">#</span>
            <input
              type="text"
              id="dsCategoria"
              name="dsCategoria"
              autocomplete="off"
              required
              maxlength="80"
              placeholder="Ex.: Supermercado"
            />
          </div>

          <label for="diaCorte">Dia de Corte</label>
          <div class="group-input-shell">
            <span class="group-input-icon" aria-hidden="true">D</span>
            <input
              type="number"
              id="diaCorte"
              name="diaCorte"
              required
              min="1"
              max="30"
              step="1"
              placeholder="Ex.: 30"
            />
          </div>

          <label for="valorMeta">Valor Meta</label>
          <div class="group-input-shell">
            <span class="group-input-icon" aria-hidden="true">R$</span>
            <input
              type="text"
              id="valorMeta"
              name="valorMeta"
              required
              inputmode="numeric"
              autocomplete="off"
              maxlength="16"
              placeholder="Ex.: 600,00"
            />
          </div>

          <div class="icon-action-row">
            <button type="submit" class="icon-action-button icon-action-button-success" id="updateBudgetButton" aria-label="Alterar orcamento" title="Alterar orcamento">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>
              <span>Alterar</span>
            </button>
            <button type="button" class="icon-action-button icon-action-button-danger" id="deleteBudgetButton" aria-label="Excluir orcamento" title="Excluir orcamento">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 6h18"/><path d="M8 6V4h8v2"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v5"/><path d="M14 11v5"/></svg>
              <span>Excluir</span>
            </button>
          </div>
        </form>

        <p class="api-result" id="budgetUpdateResult" hidden></p>

        <div class="action-buttons action-buttons-compact">
          <button type="button" class="ghost-button ghost-button-dark" id="homeButton">Home</button>
        </div>
      </section>
    </main>

    <script src="/moneyInput.js" defer></script>
    <script src="/orcamentosalter.js" defer></script>
  </body>
</html>
